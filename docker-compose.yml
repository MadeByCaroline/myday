services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_sqlite_data:/app/data
      - ./backend/.env:/app/.env
    depends_on:
      redis:
        condition: service_healthy
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  backend_node_modules:
  backend_sqlite_data:
  frontend_node_modules:
  redis_data:
